rules:
  # This repo uses version tags (e.g. @v6) rather than SHA pins.
  # Pinning all third-party actions to SHAs is a separate policy decision;
  # disable globally so the linter catches real security findings instead.
  unpinned-uses:
    disable: true

  # These self-hosted QA workflows cache a clone of the pinned external
  # erigontech/rpc-tests repo (cache key includes RPC_VERSION). The restored
  # content is fixed and re-fetchable test code, not build output feeding a
  # publish or deploy step, so a poisoned cache has no privileged sink here.
  # Tracked in #21132.
  cache-poisoning:
    ignore:
      - qa-rpc-integration-tests-gnosis.yml
      - qa-rpc-integration-tests.yml
      - qa-sync-from-scratch.yml

  # ci-gate orchestrates the reusable test leaves. A called workflow's token
  # permissions are capped by the caller, so ci-gate's workflow-level
  # actions: write is the cap that lets every self-cancelling leaf run
  # `gh run cancel`; pull-requests: write is used by the gate's own
  # dequeuePullRequest mutation. Both are genuinely needed workflow-wide and
  # can't be scoped to a single job. Tracked in #21132.
  excessive-permissions:
    ignore:
      - ci-gate.yml

  # The remaining `secrets: inherit` calls target same-repo reusable workflows
  # that genuinely consume secrets — sonar (SONAR_TOKEN) and the DockerHub-pull
  # hive/kurtosis suites (DOCKERHUB_PULL_*). Those callees read the secrets
  # directly without declaring workflow_call secrets, so inherit is how they
  # receive them. Tracked in #21132.
  secrets-inherit:
    ignore:
      - cache-warming.yml
      - cache-warming-kurtosis-cl-images.yml
      - cache-warming-kurtosis-gloas-images.yml
      - ci-gate.yml
      - sonar-branch-scan.yml

  # This workflow must build and publish an image for every triggering commit;
  # a concurrency group would cancel intermediate queued runs and skip images.
  concurrency-limits:
    ignore:
      - ci-cd-main-branch-docker-images.yml
