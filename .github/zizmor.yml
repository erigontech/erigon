rules:
  # This repo uses version tags (e.g. @v6) rather than SHA pins.
  # Pinning all third-party actions to SHAs is a separate policy decision;
  # disable globally so the linter catches real security findings instead.
  unpinned-uses:
    disable: true

  # These self-hosted QA workflows cache a clone of the pinned external
  # erigontech/rpc-tests repo (cache key includes RPC_VERSION). The restored
  # content is fixed and re-fetchable test code, not build output feeding a
  # publish or deploy step, so a poisoned cache has no privileged sink here.
  # Tracked in #21132.
  cache-poisoning:
    ignore:
      - qa-rpc-integration-tests-gnosis.yml
      - qa-rpc-integration-tests.yml
      - qa-sync-from-scratch.yml

  # Workflows missing explicit permissions: blocks — needs a cleanup pass
  # to add least-privilege permissions to each workflow; tracked in #21132.
  excessive-permissions:
    disable: true

  # secrets: inherit is intentional in ci-gate.yml and cache-warming.yml;
  # tracked in #21132.
  secrets-inherit:
    disable: true

  # This workflow must build and publish an image for every triggering commit;
  # a concurrency group would cancel intermediate queued runs and skip images.
  concurrency-limits:
    ignore:
      - ci-cd-main-branch-docker-images.yml
