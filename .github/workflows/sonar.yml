name: SonarCloud

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      cache-warming-only:
        description: "Compile test binaries only; skip test execution (for cache warming runs)"
        type: boolean
        default: false
      scan-only:
        description: "Reuse the coverage artifact from this commit's merge-queue run instead of running tests (for post-merge branch scans)"
        type: boolean
        default: false

defaults:
  run:
    shell: bash

jobs:
  sonar:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout custom actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon
        with:
          # SonarCloud uses JGit for git blame, which cannot lazy-fetch blobs
          # from partial/blobless clones (known JGit limitation, no fix planned).
          # A full clone (filter: '') ensures all blobs are present upfront.
          filter: ''
          submodules: true
          cleanup-space: true
          ramdisk: true

      # The merge queue fast-forwards the target branch to the already-tested
      # merge commit, so the pushed SHA equals a merge-queue run's head SHA and
      # that run's coverage artifact corresponds to this commit exactly.
      - name: Locate merge-queue coverage artifact
        id: coverage-artifact
        if: inputs.scan-only
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          found=false
          run_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${GITHUB_SHA}&event=merge_group" \
            --jq '[.workflow_runs[] | select(.path == ".github/workflows/ci-gate.yml")][0].id // empty' 2>/dev/null) || run_id=""
          if [ -n "$run_id" ]; then
            count=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?name=sonar-coverage" \
              --jq '[.artifacts[] | select(.expired | not)] | length' 2>/dev/null) || count=0
            if [ "${count:-0}" -gt 0 ]; then
              found=true
            fi
          fi
          if [ "$found" = "false" ]; then
            echo "::warning::No merge-queue coverage artifact for ${GITHUB_SHA}; running tests with coverage in this run"
          fi
          {
            echo "found=$found"
            echo "run_id=$run_id"
          } >> "$GITHUB_OUTPUT"

      - name: Download merge-queue coverage artifact
        if: inputs.scan-only && steps.coverage-artifact.outputs.found == 'true'
        uses: actions/download-artifact@v8
        with:
          name: sonar-coverage
          run-id: ${{ steps.coverage-artifact.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Run tests with coverage
        if: "!inputs.cache-warming-only && (!inputs.scan-only || steps.coverage-artifact.outputs.found != 'true')"
        env:
          SKIP_FLAKY_TESTS: 'true'
        run: make test-sonar-coverage

      # Merge-queue runs produce the coverage profile but leave the scan to the
      # push-triggered SonarCloud Branch Scan workflow, which submits branch
      # analyses one at a time so SonarCloud never rejects them as out of order.
      - name: Upload coverage artifact for the post-merge scan
        if: "!inputs.cache-warming-only && github.event_name == 'merge_group'"
        uses: actions/upload-artifact@v7
        with:
          name: sonar-coverage
          path: coverage-test-all.out
          retention-days: 7
          if-no-files-found: error

      - name: Build test binaries (cache warming)
        if: inputs.cache-warming-only
        run: go test -run=^$ -cover ./...

      # The scanner engine jar is the other artifact scans pull from
      # scanner.sonarcloud.io (a 403-prone CDN), so push runs seed it into the
      # actions cache for PR and merge-queue scans to restore. Seeding is
      # best-effort: on failure the next push retries, and scans fall back to
      # downloading.
      - name: Look up current SonarCloud scanner engine
        id: engine
        if: inputs.cache-warming-only
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          meta=$(curl -fsSL --retry 5 --retry-all-errors \
            -H "Authorization: Bearer ${SONAR_TOKEN}" \
            https://api.sonarcloud.io/analysis/engine)
          {
            echo "filename=$(jq -er .filename <<<"$meta")"
            echo "sha256=$(jq -er .sha256 <<<"$meta")"
            echo "url=$(jq -er .downloadUrl <<<"$meta")"
          } >> "$GITHUB_OUTPUT"

      - name: Check SonarCloud scanner engine cache
        id: engine-cache
        if: inputs.cache-warming-only && steps.engine.outcome == 'success'
        uses: actions/cache/restore@v5
        with:
          path: ~/.sonar/cache
          key: sonar-scanner-engine|${{ steps.engine.outputs.sha256 }}
          lookup-only: true

      - name: Download SonarCloud scanner engine
        id: engine-download
        if: inputs.cache-warming-only && steps.engine.outcome == 'success' && steps.engine-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        env:
          ENGINE_FILENAME: ${{ steps.engine.outputs.filename }}
          ENGINE_SHA256: ${{ steps.engine.outputs.sha256 }}
          ENGINE_URL: ${{ steps.engine.outputs.url }}
        run: |
          dir="$HOME/.sonar/cache/${ENGINE_SHA256}"
          mkdir -p "$dir"
          curl -fsSL --retry 5 --retry-all-errors -o "$dir/${ENGINE_FILENAME}" "$ENGINE_URL"
          echo "${ENGINE_SHA256}  $dir/${ENGINE_FILENAME}" | sha256sum -c

      - name: Save SonarCloud scanner engine cache
        if: inputs.cache-warming-only && steps.engine-download.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: ~/.sonar/cache
          key: sonar-scanner-engine|${{ steps.engine.outputs.sha256 }}

      # The runner image ships the same JRE major version the scanner would
      # otherwise download from scanner.sonarcloud.io (a 403-prone CDN);
      # if the image ever drops it, the scanner falls back to downloading.
      - name: Use preinstalled JDK for SonarCloud scanner
        if: "!inputs.cache-warming-only && github.event_name != 'merge_group'"
        run: |
          if [ -n "${JAVA_HOME_21_X64}" ] && [ -x "${JAVA_HOME_21_X64}/bin/java" ]; then
            echo "SONAR_SCANNER_SKIP_JRE_PROVISIONING=true" >> "$GITHUB_ENV"
            echo "SONAR_SCANNER_JAVA_EXE_PATH=${JAVA_HOME_21_X64}/bin/java" >> "$GITHUB_ENV"
          fi

      # The scanner resolves the engine jar by sha256 in ~/.sonar/cache before
      # downloading, so restoring the seeded jar removes the per-scan fetch from
      # scanner.sonarcloud.io. A miss (engine version rotated since the last
      # base-branch push) falls back to downloading plus the retry below.
      - name: Restore SonarCloud scanner engine cache
        if: "!inputs.cache-warming-only && github.event_name != 'merge_group'"
        uses: actions/cache/restore@v5
        with:
          path: ~/.sonar/cache
          key: sonar-scanner-engine|
          restore-keys: sonar-scanner-engine|

      # The scan reaches external services (scanner-binaries CDN, GPG keyserver,
      # sonarcloud.io) that intermittently 403 or time out; one spaced retry
      # rides out short blips instead of failing the gate.
      - name: SonarCloud scan
        id: scan
        if: "!inputs.cache-warming-only && github.event_name != 'merge_group'"
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Wait before SonarCloud scan retry
        if: steps.scan.outcome == 'failure'
        run: sleep 90

      - name: SonarCloud scan (retry)
        if: steps.scan.outcome == 'failure'
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - uses: ./.github/actions/cleanup-erigon
        if: always()

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::error title=Merge-queue root-cause failure::This job failed and is fast-cancelling the CI Gate run; THIS job is the real failure (the others show as cancelled). See its logs."
          gh run cancel ${{ github.run_id }} || true
