name: SonarCloud

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release/**'
    paths-ignore:
      - 'dashboards/**'
      - '**/*.md'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - 'release/**'
    paths-ignore:
      - 'dashboards/**'
      - '**/*.md'
      - '.github/workflows/**'

defaults:
  run:
    shell: bash

jobs:
  sonar:
    concurrency:
      group: >-
        ${{
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) &&
          format('{0}-{1}', github.workflow, github.run_id) ||
          format('{0}-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout custom actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon
        with:
          # SonarCloud uses JGit for git blame, which cannot lazy-fetch blobs
          # from partial/blobless clones (known JGit limitation, no fix planned).
          # A full clone (filter: '') ensures all blobs are present upfront.
          filter: ''
          submodules: true
          lfs: tests
          ramdisk: true

      - name: Run tests with coverage
        env:
          SKIP_FLAKY_TESTS: 'true'
        run: make test-sonar-coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - uses: ./.github/actions/cleanup-erigon
        if: always()
