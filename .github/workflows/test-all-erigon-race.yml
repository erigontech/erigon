name: All tests (with -race)

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  # Workflow files can't read local files directly — they must be loaded via a
  # job step. We do this so the matrix group names come from the same source as
  # the test code (tools/test-groups), keeping CI and local runs in sync.
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      test-groups: ${{ steps.load.outputs.groups }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: load
        run: echo "groups=$(./tools/test-groups names)" >> $GITHUB_OUTPUT

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::error title=Merge-queue root-cause failure::This job failed and is fast-cancelling the CI Gate run; THIS job is the real failure (the others show as cancelled). See its logs."
          gh run cancel ${{ github.run_id }} || true

  tests-linux:
    needs: load-matrix
    timeout-minutes: 90
    strategy:
      # In merge_group: cancel sibling shards on first failure so ci-gate's
      # `needs` reach terminal state quickly and the broken PR can be evicted.
      # In PR runs: keep all shards going so authors see the full failure
      # picture across every shard.
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        os:
          - ubuntu-latest
        test-group: ${{ fromJson(needs.load-matrix.outputs.test-groups) }}
        # Run both serial and parallel exec paths so race-detector signal
        # covers both. Each entry runs on its own GitHub-hosted runner —
        # wall-clock unchanged, runner-minutes doubled.
        exec_mode:
          - serial
          - parallel
    name: tests-linux (${{ matrix.os }}, ${{ matrix.test-group }}, ${{ matrix.exec_mode }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Declare runners
        run: |
          set +x
          echo "This workflow is being executed by this runner: $RUNNER_NAME"

      - name: Checkout custom actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon
        with:
          submodules: true
          cleanup-space: true
          build-cache-extra-key: ${{ matrix.test-group }}
          ramdisk: true

      - name: Run ${{ matrix.test-group }} tests on ${{ matrix.os }} (${{ matrix.exec_mode }} exec)
        env:
          SKIP_FLAKY_TESTS: 'true'
          CGO_CFLAGS: -D__BLST_PORTABLE__
          # Toggle dbg.Exec3Parallel from CI without code changes. envLookup
          # in common/dbg/dbg_env.go auto-prepends ERIGON_, so this maps to
          # the EXEC3_PARALLEL flag declared in common/dbg/experiments.go.
          ERIGON_EXEC3_PARALLEL: ${{ matrix.exec_mode == 'parallel' && 'true' || 'false' }}
        run: make test-group TEST_GROUP=${{ matrix.test-group }} GO_FLAGS="-race -timeout=60m"

      - uses: ./.github/actions/cleanup-erigon
        if: always()

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::error title=Merge-queue root-cause failure::This job failed and is fast-cancelling the CI Gate run; THIS job is the real failure (the others show as cancelled). See its logs."
          gh run cancel ${{ github.run_id }} || true
