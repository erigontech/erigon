name: QA - Sync from scratch

on:
  push:
    branches:
      - 'release/3.*'
  schedule:
    - cron: '0 0 * * 0'  # Run on Sunday at 00:00 AM UTC
  workflow_dispatch:     # Run manually

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-from-scratch-test:
    runs-on: [self-hosted, qa, long-running]
    timeout-minutes: 1440  # 24 hours
    strategy:
      fail-fast: false
      matrix:
        include:
          - chain: mainnet   # Chain name as specified on the erigon command line
            tracking_time_seconds: 7200
            total_time_seconds: 82800  # 23 hours (1h buffer before job timeout)
            rpc_tests_supported: true
          - chain: gnosis
            tracking_time_seconds: 7200
            total_time_seconds: 64800  # 18 hours
            rpc_tests_supported: true
          - chain: sepolia
            tracking_time_seconds: 7200
            total_time_seconds: 36000  # 10 hours
            rpc_tests_supported: false
          - chain: hoodi
            tracking_time_seconds: 7200
            total_time_seconds: 21600  # 6 hours
            rpc_tests_supported: false
          - chain: chiado
            tracking_time_seconds: 7200
            total_time_seconds: 18000  # 5 hours
            rpc_tests_supported: false
    env:
      ERIGON_DATA_DIR: ${{ github.workspace }}/erigon_data
      ERIGON_QA_PATH: /home/qarunner/erigon-qa
      TRACKING_TIME_SECONDS: ${{ matrix.tracking_time_seconds || 7200 }} # default 2 hours
      TOTAL_TIME_SECONDS: ${{ matrix.total_time_seconds || 43200 }} # 12 hours
      CHAIN: ${{ matrix.chain }}
      ERIGON_ASSERT: true

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Clean Erigon Build & Data Directories
      run: |
        make clean
        rm -rf $ERIGON_DATA_DIR

    - name: Build Erigon
      run: |
        make erigon rpcdaemon integration
      working-directory: ${{ github.workspace }}

    - name: Pause the Erigon instance dedicated to db maintenance
      run: |
        python3 $ERIGON_QA_PATH/test_system/db-producer/pause_production.py || true

    - name: Run Erigon and monitor chain sync
      id: test_step
      run: |
        set +e # Disable exit on error

        # Run Erigon, wait sync and check ability to maintain sync
        python3 $ERIGON_QA_PATH/test_system/qa-tests/tip-tracking/run_and_check_tip_tracking.py \
          ${{ github.workspace }}/build/bin $ERIGON_DATA_DIR $TRACKING_TIME_SECONDS $TOTAL_TIME_SECONDS Erigon3 $CHAIN

        # Capture monitoring script exit status
        test_exit_status=$?

        # Save the subsection reached status
        echo "test_executed=true" >> "$GITHUB_OUTPUT"

        # Check test runner script exit status
        if [ $test_exit_status -eq 0 ]; then
          echo "Tests completed successfully"
          echo "::notice::Tests completed successfully"
          echo "TEST_RESULT=success" >> "$GITHUB_OUTPUT"
        else
          echo "Error detected during tests"
          echo "::error::Error detected during tests"
          echo "TEST_RESULT=failure" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    - name: Upload Downloader Torrent Client Status
      if: ${{ always() && steps.test_step.outputs.test_executed == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: torrent-client-status-${{ env.CHAIN }}
        path: torrent-client-status.txt

    - name: Save test results
      if: ${{ always() && steps.test_step.outputs.test_executed == 'true' }}
      env:
        TEST_RESULT: ${{ steps.test_step.outputs.TEST_RESULT }}
      run: |
        python3 $ERIGON_QA_PATH/test_system/qa-tests/uploads/upload_test_results.py \
          --repo erigon \
          --commit $(git rev-parse HEAD) \
          --branch ${{ github.ref_name }} \
          --test_name sync-from-scratch \
          --chain $CHAIN \
          --runner ${{ runner.name }} \
          --outcome $TEST_RESULT \
          --result_file ${{ github.workspace }}/result-$CHAIN.json

    - name: Upload test results
      if: ${{ always() && steps.test_step.outputs.test_executed == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: test-results-${{ env.CHAIN }}
        path: |
          ${{ github.workspace }}/result-${{ env.CHAIN }}.json
          ${{ github.workspace }}/erigon_data/logs/

    - name: Upload metric plots
      if: ${{ always() && steps.test_step.outputs.test_executed == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: metric-plots-${{ env.CHAIN }}
        path: ${{ github.workspace }}/metrics-${{ env.CHAIN }}-plots*

    - name: Upload FD Leak Analysis
      if: ${{ always() && steps.test_step.outputs.test_executed == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: fd-leak-analysis-${{ env.CHAIN }}
        path: ${{ github.workspace }}/fd-leak-analysis-${{ env.CHAIN }}.md

    - name: Restore rpc-tests cache
      if: ${{ matrix.rpc_tests_supported }}
      uses: actions/cache@v5
      with:
        path: ${{ runner.workspace }}/rpc-tests
        key: rpc-tests-${{ runner.os }}-${{ runner.arch }}-v2.4.0

    - name: Run RPC Integration Tests
      id: rpc_test_step
      if: ${{ matrix.rpc_tests_supported && steps.test_step.outputs.TEST_RESULT == 'success' }}
      run: |
        commit=$(git rev-parse --short HEAD)
        RPC_TEST_RESULT_DIR="${{ github.workspace }}/rpc-test-results/${CHAIN}_$(date +%Y%m%d_%H%M%S)_post_sync_${commit}"
        echo "RPC_TEST_RESULT_DIR=$RPC_TEST_RESULT_DIR" >> $GITHUB_ENV

        set +e
        ${{ github.workspace }}/.github/workflows/scripts/run_rpc_tests_local.sh \
          --datadir "$ERIGON_DATA_DIR" \
          --chain "$CHAIN" \
          --workspace "${{ runner.workspace }}" \
          --result-dir "$RPC_TEST_RESULT_DIR" \
          --skip-backup
        rpc_exit_status=$?
        set -e

        echo "rpc_test_executed=true" >> $GITHUB_OUTPUT

        if [ $rpc_exit_status -eq 0 ]; then
          echo "RPC tests completed successfully"
          echo "RPC_TEST_RESULT=success" >> $GITHUB_OUTPUT
        else
          echo "::error::RPC tests failed, check the artifacts for details"
          echo "RPC_TEST_RESULT=failure" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Upload RPC test results
      if: ${{ always() && steps.rpc_test_step.outputs.rpc_test_executed == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: rpc-test-results-${{ env.CHAIN }}
        path: ${{ env.RPC_TEST_RESULT_DIR }}

    - name: Save RPC test results
      if: ${{ always() && steps.rpc_test_step.outputs.rpc_test_executed == 'true' }}
      env:
        RPC_TEST_RESULT: ${{ steps.rpc_test_step.outputs.RPC_TEST_RESULT }}
      run: |
        python3 $ERIGON_QA_PATH/test_system/qa-tests/uploads/upload_test_results.py \
          --repo erigon \
          --commit $(git rev-parse HEAD) \
          --branch ${{ github.ref_name }} \
          --test_name rpc-integration-tests \
          --chain $CHAIN \
          --runner ${{ runner.name }} \
          --outcome $RPC_TEST_RESULT \
          --result_file ${{ env.RPC_TEST_RESULT_DIR }}/results/test_report.json

    - name: Clean up Erigon data directory
      if: always()
      run: |
        rm -rf $ERIGON_DATA_DIR

    - name: Resume the Erigon instance dedicated to db maintenance
      if: always()
      run: |
        python3 $ERIGON_QA_PATH/test_system/db-producer/resume_production.py || true
