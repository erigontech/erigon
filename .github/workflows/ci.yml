name: Unit tests

on: pull_request

jobs:
  linux:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup space
        if: runner.os == 'Linux'
        run: |
          rm -fr /opt/az \
                 /opt/microsoft \
                 /usr/share/dotnet \
                 /usr/share/miniconda \
                 /usr/share/swift

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: true

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies on Linux runner
        if: runner.os == 'Linux'
        run: sudo apt update -y && sudo apt install -y build-essential

      - name: Testing build all
        run: make all

      - name: Reproducible build test
        run: |
          make erigon
          shasum -a256 ./build/bin/erigon > erigon1.sha256
          make erigon
          shasum -a256 ./build/bin/erigon > erigon2.sha256
          if ! cmp -s erigon1.sha256 erigon2.sha256; then
            echo >&2 "Reproducible build broken"; cat erigon1.sha256; cat erigon2.sha256; exit 1
          fi

      - name: Execute test-short
        run: make test-short

  win:
    strategy:
      matrix:
        os: [windows-2025]
    runs-on: ubuntu-latest
    steps:
      - run: echo "::warning::This job is a stub. Tests now run in the 'All tests' workflow (.github/workflows/test-all-erigon.yml)."
