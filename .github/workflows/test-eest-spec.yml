name: EEST spec tests

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  eest-spec-tests:
    name: eest-spec-${{ matrix.suite }}-${{ matrix.fixtures }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { suite: statetests,   fixtures: stable, workers: 12, max-allowed-failures: 37 }
          - { suite: statetests,   fixtures: devnet, workers: 12, max-allowed-failures: 5253 }
          - { suite: blocktests,   fixtures: stable, workers: 12, max-allowed-failures: 0 }
          - { suite: blocktests,   fixtures: devnet, workers: 12, max-allowed-failures: 6206 }
          - { suite: enginextests, fixtures: stable,    workers: 8, max-allowed-failures: 0 }
          - { suite: enginextests, fixtures: devnet,    workers: 8, max-allowed-failures: 0 }
          - { suite: enginextests, fixtures: benchmark, workers: 1, max-allowed-failures: 72 }
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RAMDISK_SIZE_MB: '8192'

    steps:
      - name: Declare runner
        run: echo "Runner $RUNNER_NAME"

      - name: Checkout custom actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon
        with:
          submodules: false
          lfs: false
          cleanup-space: true
          ramdisk: true
          build-cache-extra-key: eest-spec-${{ matrix.suite }}-${{ matrix.fixtures }}

      - name: Cache EEST tarballs
        uses: actions/cache@v4
        with:
          # Only cache the .tar.gz files; extracted dirs are recreated by
          # tools/test-fixtures.sh on each run from the cached tarballs.
          # Dedicated EEST cache so this workflow doesn't compete with
          # test-integration-caplin.yml's cl_mainnet cache under one key.
          path: |
            test-fixtures-cache/eest_stable.tar.gz
            test-fixtures-cache/eest_devnet.tar.gz
            test-fixtures-cache/eest_benchmark.tar.gz
          key: test-fixtures-eest-${{ runner.os }}-${{ hashFiles('test-fixtures.json') }}
          restore-keys: |
            test-fixtures-eest-${{ runner.os }}-

      # Skip enginextests-devnet until the devnet tarball ships
      # blockchain_tests_engine_x/. The non-`_x` `blockchain_tests_engine/`
      # variant uses a different JSON schema (inline `pre`, no `preHash`)
      # that the cmd/evm enginextest runner cannot consume. Matrix entry
      # stays so re-enabling is a one-line guard removal once the fixture
      # lands. Job-level `if:` can't see `matrix.*`, so the guard lives on
      # the run step.
      - name: Run eest-spec-${{ matrix.suite }}-${{ matrix.fixtures }}
        if: matrix.suite != 'enginextests' || matrix.fixtures != 'devnet'
        env:
          EEST_SPEC_MAX_FAILURES: ${{ matrix.max-allowed-failures }}
          EEST_SPEC_WORKERS: ${{ matrix.workers }}
        run: make eest-spec-${{ matrix.suite }}-${{ matrix.fixtures }}

      - name: Skipped (devnet lacks blockchain_tests_engine_x fixtures)
        if: matrix.suite == 'enginextests' && matrix.fixtures == 'devnet'
        run: echo "Skipping eest-spec-enginextests-devnet; see workflow comment."

      - uses: ./.github/actions/cleanup-erigon
        if: always()

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }} || true
