name: EEST spec tests

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  eest-spec-tests:
    name: eest-spec-${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { shard: statetests-stable,            workers: 12, max-allowed-failures: 37 }
          - { shard: statetests-devnet,            workers: 12, max-allowed-failures: 5253 }
          - { shard: blocktests-stable,            workers: 12, max-allowed-failures: 0 }
          - { shard: blocktests-devnet,            workers: 12, max-allowed-failures: 6206 }
          - { shard: enginextests-stable,          workers: 8,  max-allowed-failures: 0 }
          - { shard: enginextests-benchmark-1m,    workers: 1,  max-allowed-failures: 0 }
          - { shard: enginextests-benchmark-5m,    workers: 1,  max-allowed-failures: 0 }
          - { shard: enginextests-benchmark-10m,   workers: 1,  max-allowed-failures: 0 }
          - { shard: enginextests-benchmark-30m,   workers: 1,  max-allowed-failures: 0 }
          - { shard: enginextests-benchmark-60m,   workers: 1,  max-allowed-failures: 7 }
          - { shard: enginextests-benchmark-100m,  workers: 1,  max-allowed-failures: 7 }
          - { shard: enginextests-benchmark-150m,  workers: 1,  max-allowed-failures: 59 }
          # Race-detected blocktest variants. Sharded per fork via --run regex
          # so each sub-shard fits under ~30 min (race overhead ~3× → the
          # un-sharded race-detected blocktests-stable would be ~41m). On
          # devnet we only race the Amsterdam fork — it carries the new EIPs
          # under development and that's where the race signal is most
          # valuable; the rest of the devnet fork-tree just retreads stable
          # coverage under race-instrumentation.
          - { shard: blocktests-stable-race-pre-cancun,  workers: 12, max-allowed-failures: 0 }
          - { shard: blocktests-stable-race-cancun,      workers: 12, max-allowed-failures: 0 }
          - { shard: blocktests-stable-race-prague,      workers: 12, max-allowed-failures: 0 }
          - { shard: blocktests-stable-race-osaka,       workers: 12, max-allowed-failures: 0 }
          - { shard: blocktests-devnet-race-amsterdam,   workers: 12, max-allowed-failures: 6140 }
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RAMDISK_SIZE_MB: '8192'

    steps:
      - name: Declare runner
        run: echo "Runner $RUNNER_NAME"

      - name: Checkout custom actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon
        with:
          submodules: false
          lfs: false
          cleanup-space: true
          ramdisk: true
          build-cache-extra-key: eest-spec-${{ matrix.shard }}

      - name: Cache EEST tarballs
        uses: actions/cache@v4
        with:
          # Only cache the .tar.gz files; extracted dirs are recreated by
          # tools/test-fixtures.sh on each run from the cached tarballs.
          # Dedicated EEST cache so this workflow doesn't compete with
          # test-integration-caplin.yml's cl_mainnet cache under one key.
          path: |
            test-fixtures-cache/eest_stable.tar.gz
            test-fixtures-cache/eest_devnet.tar.gz
            test-fixtures-cache/eest_benchmark.tar.gz
          key: test-fixtures-eest-${{ runner.os }}-${{ hashFiles('test-fixtures.json') }}
          restore-keys: |
            test-fixtures-eest-${{ runner.os }}-

      # enginextests-devnet is intentionally not in the matrix: the devnet
      # tarball does not currently ship blockchain_tests_engine_x/, and
      # leaving the cell as a step-level skip wastes ~2m of runner setup
      # time per CI run. Re-add the matrix entry once the fixture lands.
      - name: Run eest-spec-${{ matrix.shard }}
        env:
          EEST_SPEC_MAX_FAILURES: ${{ matrix.max-allowed-failures }}
          EEST_SPEC_WORKERS: ${{ matrix.workers }}
        run: make eest-spec-${{ matrix.shard }}

      - uses: ./.github/actions/cleanup-erigon
        if: always()

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }} || true
