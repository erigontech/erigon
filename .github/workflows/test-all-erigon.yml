name: All tests

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  schedule:
    - cron: '20 16 * * *' # daily at 16:20 UTC 😙🤌
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  tests-mac-linux:
    concurrency:
      # concurrency group: there can be at most one running and one pending job in a
      # concurrency group at any time. So for commits on main/release, we use different
      # concurrency group per commit; for other branches, we use a branch-level CG.
      group: >-
        ${{
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) &&
          format('{0}-{1}-{2}', github.workflow, matrix.os, github.run_id) ||
          format('{0}-{1}-{2}', github.workflow, matrix.os, github.ref)
        }}
      cancel-in-progress: true
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
    runs-on: ${{ matrix.os }}

    steps:
      - name: Declare runners
        run: |
          set +x
          echo "This workflow is being executed by this runner: $RUNNER_NAME"

      - name: Checkout custom actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon
        with:
          submodules: true
          lfs: tests

      - name: Run all tests on ${{ matrix.os }}
        env:
          SKIP_FLAKY_TESTS: 'true'
        run: |
          if ! make test-all; then
            # Retry after clearing the Go build cache. Low disk space can cause
            # severe, non-obvious build/test failures that don't surface a clear
            # "no space left" message. Tuning a cache size limit is too fragile;
            # Go's own cache trimmer handles the common case, and this clobber
            # handles the rest.
            echo "::notice::make test-all failed; clearing Go build cache and retrying"
            time go clean -cache
            make test-all
          fi

      - name: Report uncached test packages
        if: always()
        run: |
          if [ -f run.log ]; then
            awk '/^ok/ && !/\(cached\)/ { print "::notice::" $2 " ran without test cache (" $3 ")" }' run.log
          fi

      - name: SonarCloud scan in case OS Linux
        if: runner.os == 'Linux'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - uses: ./.github/actions/cleanup-erigon
        if: always()


