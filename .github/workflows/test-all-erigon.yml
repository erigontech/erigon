name: All tests

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  tests-mac-linux:
    strategy:
      # In merge_group: cancel sibling shards on first failure so ci-gate's
      # `needs` reach terminal state quickly and the broken PR can be evicted.
      # In PR runs: keep all shards going so authors see the full failure
      # picture across every shard.
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
        # Run both serial and parallel commitment paths every time so
        # divergence is caught on the PR rather than after a release. Execution
        # is parallel in both legs (dbg.Exec3Parallel defaults true). The matrix
        # entries spawn separate runners and run concurrently — wall-clock
        # unchanged, runner-minutes doubled.
        commitment_mode:
          - serial
          - parallel
        include:
          # Windows GitHub-hosted runners run noticeably slower than Linux for
          # this suite; give them extra headroom to avoid marginal timeouts
          # while keeping Linux/macOS at the tighter 20m.
          - os: windows-2025
            test_timeout: 30m
            skip_execution_tests: 'true'
          - os: macos-15
            skip_execution_tests: 'true'
    name: tests-mac-linux (${{ matrix.os }}, ${{ matrix.commitment_mode }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Declare runners
        run: |
          set +x
          echo "This workflow is being executed by this runner: $RUNNER_NAME"

      - name: Checkout custom actions
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon
        with:
          submodules: true
          cleanup-space: true
          ramdisk: true
          cache-namespace: test-all-erigon
          # Go's test cache can't see ERIGON_COMMITMENT_PARALLEL (read at package
          # init), so serial and parallel results only stay mode-pure if each
          # commitment mode keeps its own cache lineage.
          build-cache-extra-key: ${{ matrix.commitment_mode }}

      - name: Run all tests on ${{ matrix.os }} (${{ matrix.commitment_mode }} commitment)
        env:
          SKIP_FLAKY_TESTS: 'true'
          TEST_TIMEOUT: ${{ matrix.test_timeout || '20m' }}
          ERIGON_SKIP_EXECUTION_TESTS: ${{ matrix.skip_execution_tests || '' }}
          # Toggle statecfg.ExperimentalParallelCommitment from CI without code
          # changes. envLookup in common/dbg/dbg_env.go auto-prepends ERIGON_, so
          # this maps to the COMMITMENT_PARALLEL flag read in db/state/statecfg.
          ERIGON_COMMITMENT_PARALLEL: ${{ matrix.commitment_mode == 'parallel' && 'true' || 'false' }}
        run: |
          if ! make test-all GO_FLAGS="--timeout $TEST_TIMEOUT"; then
            # Retry after clearing the Go build cache. Low disk space can cause
            # severe, non-obvious build/test failures that don't surface a clear
            # "no space left" message. Tuning a cache size limit is too fragile;
            # Go's own cache trimmer handles the common case, and this clobber
            # handles the rest.
            echo "::notice::make test-all failed; clearing Go build cache and retrying"
            time go clean -cache
            make test-all GO_FLAGS="--timeout $TEST_TIMEOUT"
          fi

      - uses: ./.github/actions/cleanup-erigon
        if: always()

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::error title=Merge-queue root-cause failure::This job failed and is fast-cancelling the CI Gate run; THIS job is the real failure (the others show as cancelled). See its logs."
          gh run cancel ${{ github.run_id }} || true
