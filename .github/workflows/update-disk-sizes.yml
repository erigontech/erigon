name: Docs - Update disk sizes

# Manual utility. Given a successful `QA - Sync from scratch` (or minimal
# node) run ID, downloads its disk-usage artifacts, regenerates
# docs/site/src/data/disk-sizes.json, and uploads the result as a workflow
# artifact (`disk-sizes-json`). The docs operator then downloads the
# artifact and includes the file in the weekly docs update PR.
#
# Previously this workflow auto-fired on every successful sync via
# `workflow_run` and opened its own draft PR, but the new-branch push from
# a workflow context with the default GITHUB_TOKEN is consistently rejected
# with "Unable to determine if workflow can be created or updated due to
# timeout; `workflows` scope may be required." Rather than carry a custom
# GraphQL Contents API path just for that one workflow, the update is now
# included in the weekly docs PR by the docs operator — the values need a
# human sanity check anyway. See erigon-docs-check-routine.md Step 3.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow run ID to pull disk-usage artifacts from"
        required: true
      base_branch:
        description: "Base branch to update"
        required: true
        default: "release/3.4"
      prune_mode:
        description: "Prune mode measured in that run"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - minimal

permissions:
  contents: read
  actions: read

concurrency:
  group: update-disk-sizes-manual
  cancel-in-progress: false

jobs:
  update-disk-sizes:
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        id: determine
        env:
          INPUT_PRUNE_MODE: ${{ github.event.inputs.prune_mode }}
          INPUT_RUN_ID: ${{ github.event.inputs.run_id }}
          INPUT_BASE_BRANCH: ${{ github.event.inputs.base_branch }}
        run: |
          set -euo pipefail
          case "$INPUT_PRUNE_MODE" in
            full|minimal) ;;
            *)
              echo "::error::Invalid prune mode: $INPUT_PRUNE_MODE"
              exit 1
              ;;
          esac
          if ! [[ "$INPUT_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid run_id: must be numeric"
            exit 1
          fi
          if ! [[ "$INPUT_BASE_BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Invalid base_branch: allowed chars are [A-Za-z0-9._/-]"
            exit 1
          fi
          printf 'prune_mode=%s\n' "$INPUT_PRUNE_MODE" >> "$GITHUB_OUTPUT"
          printf 'source_run_id=%s\n' "$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
          printf 'base_branch=%s\n' "$INPUT_BASE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.determine.outputs.base_branch }}
          persist-credentials: false

      - name: Download disk usage artifacts
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.determine.outputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: disk-usage-*
          path: ./artifacts
          merge-multiple: true

      - name: Verify artifacts are present
        env:
          SOURCE_RUN_ID: ${{ steps.determine.outputs.source_run_id }}
        run: |
          set -euo pipefail
          ls -lh ./artifacts/ 2>/dev/null || true
          if [ -z "$(ls -A ./artifacts 2>/dev/null)" ]; then
            echo "::error::No disk-usage artifacts found in run $SOURCE_RUN_ID — aborting"
            exit 1
          fi
          echo "Found $(ls ./artifacts | wc -l) artifact file(s)"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Update disk-sizes.json
        env:
          PRUNE_MODE: ${{ steps.determine.outputs.prune_mode }}
        run: |
          set -euo pipefail
          python3 docs/site/scripts/update-disk-sizes.py \
            ./artifacts \
            docs/site/src/data/disk-sizes.json \
            "$PRUNE_MODE"

      - name: Show diff
        run: |
          set -euo pipefail
          if git diff --quiet docs/site/src/data/disk-sizes.json; then
            echo "::notice::No changes to disk-sizes.json — artifact values match the current file"
          else
            git --no-pager diff docs/site/src/data/disk-sizes.json
          fi

      - name: Upload updated disk-sizes.json
        uses: actions/upload-artifact@v4
        with:
          name: disk-sizes-json
          path: docs/site/src/data/disk-sizes.json
          if-no-files-found: error
