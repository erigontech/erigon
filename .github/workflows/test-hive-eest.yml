name: Hive EEST tests

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  # Dynamic group to fill all available runners
  group: hive-eest-tests-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  test-hive-eest:
    runs-on:
      group: hive
    name: test-hive-eest (${{ matrix.shard }}, ${{ matrix.exec_mode }})
    strategy:
      # In merge_group: cancel sibling shards on first failure so ci-gate's
      # `needs` reach terminal state quickly and the broken PR is evicted
      # without waiting ~20 min for long-running hive simulators to drain
      # after `gh run cancel`. In PR runs: keep all shards going so authors
      # see the full failure picture across every shard.
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        # Each shard runs twice — once with serial exec
        # (ERIGON_EXEC3_PARALLEL=false) and once with parallel — so
        # divergence between the two paths is caught on the PR. Matrix
        # entries spawn separate `hive` group runners and run concurrently —
        # wall-clock unchanged, runner-minutes doubled.
        include:
          # consume-engine: split by fork for parallelism (61k+ tests total).
          # Engine API tests only exist from Paris (The Merge) onwards.
          # Pattern format: "<suite-regex>/<test-regex>" — the leading ".*/""
          # matches the suite name (eest/consume-engine) while the remainder
          # filters individual pytest test IDs by fork parameter.
          # pool-size: --client.pool.size for hive's warm-daemon client pool.
          # Tuned per shard from a trace-instrumented dispatch (run 24938677388);
          # the LRU hit-rate curve plateaus at ~50% past size=4 on the long
          # consume-engine shards (reuse is essentially depth-2 consecutive),
          # so 4 captures all available reuse and 24+ buys nothing. paris+shanghai
          # and consume-rlp have ~unique pre-state per test (0% hit at any size).
          # glamsterdam-devnet is the exception — its curve keeps climbing past
          # 24, so it gets a larger pool.
          - sim: consume-engine
            sim-limit: ".*/.*fork_(Paris|Shanghai)"
            shard: paris+shanghai
            pool-size: 0
            fixtures-tarball: eest_stable
            exec_mode: serial
          - sim: consume-engine
            sim-limit: ".*/.*fork_(Paris|Shanghai)"
            shard: paris+shanghai
            pool-size: 0
            fixtures-tarball: eest_stable
            exec_mode: parallel
          - sim: consume-engine
            sim-limit: ".*/.*fork_Cancun"
            shard: cancun
            pool-size: 4
            fixtures-tarball: eest_stable
            exec_mode: serial
          - sim: consume-engine
            sim-limit: ".*/.*fork_Cancun"
            shard: cancun
            pool-size: 4
            fixtures-tarball: eest_stable
            exec_mode: parallel
          - sim: consume-engine
            sim-limit: ".*/.*fork_Prague"
            shard: prague
            pool-size: 4
            fixtures-tarball: eest_stable
            exec_mode: serial
          - sim: consume-engine
            sim-limit: ".*/.*fork_Prague"
            shard: prague
            pool-size: 4
            fixtures-tarball: eest_stable
            exec_mode: parallel
          - sim: consume-engine
            sim-limit: ".*/.*fork_Osaka"
            shard: osaka
            pool-size: 4
            fixtures-tarball: eest_stable
            exec_mode: serial
          - sim: consume-engine
            sim-limit: ".*/.*fork_Osaka"
            shard: osaka
            pool-size: 4
            fixtures-tarball: eest_stable
            exec_mode: parallel
          - sim: consume-rlp
            sim-limit: ".*(eip2930_access_list|eip4844_blobs).*" # all tests take too long
            shard: rlp
            pool-size: 0
            fixtures-tarball: eest_stable
            exec_mode: serial
          - sim: consume-rlp
            sim-limit: ".*(eip2930_access_list|eip4844_blobs).*"
            shard: rlp
            pool-size: 0
            fixtures-tarball: eest_stable
            exec_mode: parallel
          # Glamsterdam devnet: BAL EIPs against devnet fixtures
          - sim: consume-engine
            sim-limit: ".*(7708|7778|7843|7928|7954|7976|7981|8024|8037).*"
            shard: glamsterdam-devnet
            pool-size: 24
            fixtures-tarball: eest_devnet
            extra-hive-flags: "--sim.loglevel=3 --client.checktimelimit=300s"
            erigon-extra-flags: "--experimental.bal"
            # Budget breakdown:
            #   - 2 wrong-test-expectation deterministic failures:
            #     EIP-7928 test_invalid_{pre,post}_fork_block_*_bal_hash_field
            #     expect -32602 InvalidParams but the requests are
            #     well-formed V4/V5 newPayload — the only divergence is a
            #     blockHash computed over a wrong-fork-schema header. Spec
            #     convention is InvalidStatus + INVALID_BLOCK_HASH, which
            #     is what erigon returns. Testing team has been notified.
            #   - 1 flake slot for the EIP-7928
            #     test_bal_invalid_extraneous_entries flake (#21364).
            max-failures: 3
            exec_mode: parallel
    steps:
      - name: Clean docker system
        run: |
          echo "Force stopping and removing all containers..."
          if [ -n "$(docker ps -aq)" ]; then
            docker kill $(docker ps -aq) || true
            docker rm -f $(docker ps -aq) || true
          fi
          echo "Pruning all images..."
          docker image prune -af || true
          if [ -n "$(docker images -aq)" ]; then
            echo "Force removing all images..."
            docker rmi -f $(docker images -aq) || true
          fi
          echo "Pruning docker system..."
          docker system prune -af --volumes
      - name: Checkout Erigon
        uses: actions/checkout@v6
        with:
          path: erigon-full

      - name: Read pinned Hive ref
        id: hive-version
        run: echo "ref=$(jq -r .hive_ref erigon-full/.github/workflows/hive-versions.json)" >> "$GITHUB_OUTPUT"

      - name: Checkout Hive
        uses: actions/checkout@v6
        with:
          # EXPERIMENT: pinned to erigontech/hive lystopad/eels-local-fixtures,
          # which branches yperbasis/client-pool (upstream-PR-ready warm-daemon
          # client pool, ethereum/hive#1449) and adds local-fixtures support to
          # the eels consume-engine/consume-rlp simulators (erigontech/hive#2).
          # Re-pin to the client-pool / upstream ref once those land.
          repository: erigontech/hive
          ref: 4c575d5a0ea2332ac0338d0745f2f9426c2f26ea
          path: hive

      - name: Conditional Docker Login
        # Only login if we can. Workflow works without it but we want to avoid
        # rate limiting by Docker Hub when possible. External repos don't
        # have access to our Docker secrets.
        # continue-on-error: transient Docker Hub network timeouts should not
        # abort the entire workflow — the run proceeds without login (unlogged pull).
        if: |
          github.repository == 'erigontech/erigon' && 
          github.actor != 'dependabot[bot]' &&
          (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_PULL_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PULL_TOKEN }}

      - name: Setup go env and cache
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.25'

      # Build erigon from the checked-out commit, then wrap it with Hive's
      # prebuilt-image client Dockerfile — avoids cloning the ephemeral
      # merge_group ref inside Hive's builder.
      # Plain docker build (host daemon's persistent cache), not a shared
      # type=gha scope: many matrix jobs writing one gha scope risks 504s
      # (cf. the centralized build in test-kurtosis-assertoor.yml).
      - name: Build erigon image from local source
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          retry() {
            local max=$1 n=1; shift
            until "$@"; do
              if (( n >= max )); then echo "::error::'$*' failed after ${max} attempts" >&2; return 1; fi
              echo "::warning::'$*' failed (attempt ${n}/${max}); retrying in $((n*15))s" >&2
              sleep $((n*15)); n=$((n+1))
            done
          }
          retry 3 docker build -t hive/erigon:cilocal erigon-full

      - name: Get dependencies and build hive
        env:
          # Toggle dbg.Exec3Parallel inside the hive erigon container.
          # Baked as an ENV directive into the client Dockerfile so every
          # erigon instance hive launches inherits it.
          ERIGON_EXEC3_PARALLEL: ${{ matrix.exec_mode == 'parallel' && 'true' || 'false' }}
        run: |
          cd hive
          retry() {
            local max=$1 n=1; shift
            until "$@"; do
              if (( n >= max )); then echo "::error::'$*' failed after ${max} attempts" >&2; return 1; fi
              echo "::warning::'$*' failed (attempt ${n}/${max}); retrying in $((n*15))s" >&2
              sleep $((n*15)); n=$((n+1))
            done
          }
          retry 3 go get . >> buildlogs.log
          # Point hive's default (prebuilt-image) erigon client at the image we
          # built locally above, instead of cloning erigon inside the builder.
          sed -i "s|^ARG baseimage=erigontech/erigon$|ARG baseimage=hive/erigon|" clients/erigon/Dockerfile
          sed -i "s|^ARG tag=main-latest$|ARG tag=cilocal|" clients/erigon/Dockerfile
          # Fail fast if the sed didn't apply (upstream Dockerfile ARGs changed),
          # otherwise hive would silently use the remote erigontech/erigon image.
          if ! grep -q "^ARG baseimage=hive/erigon$" clients/erigon/Dockerfile \
             || ! grep -q "^ARG tag=cilocal$" clients/erigon/Dockerfile; then
            echo "ERROR: failed to repoint hive's erigon client Dockerfile at hive/erigon:cilocal"
            exit 1
          fi
          # Inject ERIGON_EXEC3_PARALLEL into the runtime image so the
          # erigon process inside hive picks it up. Append as the last layer
          # so it doesn't invalidate earlier build caches.
          echo "ENV ERIGON_EXEC3_PARALLEL=${ERIGON_EXEC3_PARALLEL}" >> clients/erigon/Dockerfile
          erigon_extra_flags="${{ matrix.erigon-extra-flags }}"
          if [ -n "$erigon_extra_flags" ]; then
            echo "Patching erigon.sh with extra flags: $erigon_extra_flags"
            sed -i '/^echo "Running erigon/i\FLAGS="$FLAGS '"$erigon_extra_flags"'"' clients/erigon/erigon.sh
            if ! grep -qF -- "$erigon_extra_flags" clients/erigon/erigon.sh; then
              echo "ERROR: failed to patch erigon.sh with extra flags" >&2
              exit 1
            fi
          fi
          retry 3 go build . >> buildlogs.log
      # Provide EEST fixtures locally so the eels sim build doesn't re-download
      # them every run. Restore the base-branch cache warmed by
      # cache-warming-eest-fixtures.yml (restore-only — never saved here); on a
      # miss, fetch via the hardened tools/test-fixtures.sh. Then stage the
      # tarball into the sim build context, where the (local-fixtures) eels
      # Dockerfile extracts it for `consume --input /fixtures`.
      - name: Restore EEST fixtures cache
        id: eest-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            test-fixtures-cache/eest_stable.tar.gz
            test-fixtures-cache/eest_devnet.tar.gz
            test-fixtures-cache/eest_benchmark.tar.gz
            test-fixtures-cache/eest_zkevm.tar.gz
          key: test-fixtures-eest-${{ runner.os }}-${{ hashFiles('erigon-full/test-fixtures.json') }}
          restore-keys: |
            test-fixtures-eest-${{ runner.os }}-

      - name: Download EEST fixtures on cache miss
        if: steps.eest-cache.outputs.cache-hit != 'true'
        run: bash erigon-full/tools/test-fixtures.sh erigon-full/test-fixtures.json test-fixtures-cache ${{ matrix.fixtures-tarball }}

      - name: Stage fixtures into hive eels sim build context
        run: cp "test-fixtures-cache/${{ matrix.fixtures-tarball }}.tar.gz" "hive/simulators/ethereum/eels/${{ matrix.sim }}/fixtures.tar.gz"

      # Depends on the last line of hive output that prints the number of suites, tests and failed
      # Currently, we fail even if suites and tests are too few, indicating the tests did not run
      # We also fail if more than half the tests fail
      - name: Run hive tests and parse output
        run: |
          branch=$(jq -r --arg t '${{ matrix.fixtures-tarball }}' '.[$t].branch // empty' erigon-full/test-fixtures.json)
          branch_arg=""
          if [ -n "$branch" ]; then
            branch_arg="--sim.buildarg branch=$branch"
          fi
          cd hive
          docker ps
          run_suite() {
            echo -e "\n\n============================================================"
            echo "Running test: ${1}"
            echo -e "\n"
            # Retry only on the "too few tests parsed" signal (a transient
            # image-build/registry/clone failure); a completed run is judged on its first result.
            local attempt=1 max_attempts=3
            while true; do
              ./hive -docker.output -docker.auth --sim ethereum/eels/"${1}" --sim.limit="${2}" --sim.parallelism=12 --client.pool.size=${{ matrix.pool-size }} --client erigon --docker.nocache=true --sim.limit.exact=false --sim.buildarg fixtures=/fixtures ${branch_arg} ${{ matrix.extra-hive-flags }} 2>&1 | tee output.log || true
              status_line=$(tail -2 output.log | head -1 | sed -r "s/\x1B\[[0-9;]*[a-zA-Z]//g")
              suites=$(echo "$status_line" | sed -n 's/.*suites=\([0-9]*\).*/\1/p')
              if [ -z "$suites" ]; then
                status_line=$(tail -1 output.log | sed -r "s/\x1B\[[0-9;]*[a-zA-Z]//g")
                suites=$(echo "$status_line" | sed -n 's/.*suites=\([0-9]*\).*/\1/p')
              fi
              tests=$(echo "$status_line" | sed -n 's/.*tests=\([0-9]*\).*/\1/p')
              failed=$(echo "$status_line" | sed -n 's/.*failed=\([0-9]*\).*/\1/p')
              if (( ${tests:-0} >= 4 )) || (( attempt >= max_attempts )); then break; fi
              echo "::warning title=Retrying hive::Only ${tests:-0} tests parsed for ${{ matrix.shard }} (attempt ${attempt}/${max_attempts}); likely transient image-build/registry/clone error — retrying in $((attempt*20))s"
              sleep $((attempt*20)); attempt=$((attempt+1))
            done

            echo -e "\n"
            message="-----------   Results for ${1} (${{ matrix.shard }})    -----------\nTests: $tests, Failed: $failed\n\n============================================================"
            echo -e "$message"
            echo -e "$message" >> result.log

            if (( tests < 4 )); then
              echo "Too few tests run for ${{ matrix.shard }} - ${tests} tests"
              echo "failed" > failed.log
              exit 1
            fi
            max_failures=${{ matrix.max-failures || 0 }}
            if (( failed > max_failures )); then
              echo "Too many failures for ${{ matrix.shard }} - ${failed} failed out of ${tests} (max allowed: ${max_failures})"
              echo "failed" > failed.log
              exit 1
            fi
          }
          run_suite "${{ matrix.sim }}" "${{ matrix.sim-limit }}"
        continue-on-error: true
      - name: Upload output log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # exec_mode in the artifact name keeps the two matrix entries from
          # clobbering each other's logs on the same artifact key.
          name: hive-workspace-log-${{ matrix.shard }}-${{ matrix.exec_mode }}
          path: hive/workspace/logs
          if-no-files-found: ignore
      - name: Test Results
        if: always()
        run: |
          cat hive/result.log
          if grep -q "failed" hive/failed.log; then
            echo "One or more tests failed."
            exit 1
          fi
          echo "All tests passed successfully."



      # This step is not required UNTIL the github-managed runners are dismissed in favor of self-hosted ones (which is planned)
      # So it is good to PROACTIVELY run it (it should not cause any issues within github-managed runners either)
      - name: Remove Hive directory
        run: |
          echo "Removing the Hive directory..."
          rm -rf hive
        if: always()

      # This step is not required UNTIL the github-managed runners are dismissed in favor of self-hosted ones (which is planned)
      # So it is good to PROACTIVELY run it (it should not cause any issues within github-managed runners either)  
      - name: Prune docker
        run: |
          echo "Stopping and removing all containers..."
          docker rm -f $(docker ps -aq) || true
          echo "Removing all images..."
          docker rmi -f $(docker images -aq) || true
          echo "Pruning docker..."
          docker system prune -af --volumes
        if: always()

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::error title=Merge-queue root-cause failure::This job failed and is fast-cancelling the CI Gate run; THIS job is the real failure (the others show as cancelled). See its logs."
          gh run cancel ${{ github.run_id }} || true
