name: Hive EEST tests

on:
  workflow_call:
  workflow_dispatch:

env:
  EEST_VERSION: 'v5.4.0'

concurrency:
  # Dynamic group to fill all available runners
  group: hive-eest-tests-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  test-hive-eest:
    runs-on:
      group: hive
    name: test-hive-eest (${{ matrix.shard }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # consume-engine: split by fork for parallelism (61k+ tests total).
          # Engine API tests only exist from Paris (The Merge) onwards.
          # Pattern format: "<suite-regex>/<test-regex>" — the leading ".*/""
          # matches the suite name (eest/consume-engine) while the remainder
          # filters individual pytest test IDs by fork parameter.
          # pool-size: --client.pool.size for hive's warm-daemon client pool.
          # Tuned per shard from a trace-instrumented dispatch (run 24938677388);
          # the LRU hit-rate curve plateaus at ~50% past size=4 on the long
          # consume-engine shards (reuse is essentially depth-2 consecutive),
          # so 4 captures all available reuse and 24+ buys nothing. paris+shanghai
          # and consume-rlp have ~unique pre-state per test (0% hit at any size).
          # glamsterdam-devnet is the exception — its curve keeps climbing past
          # 24, so it gets a larger pool.
          - sim: consume-engine
            sim-limit: ".*/.*fork_(Paris|Shanghai)"
            shard: paris+shanghai
            pool-size: 0
          - sim: consume-engine
            sim-limit: ".*/.*fork_Cancun"
            shard: cancun
            pool-size: 4
          - sim: consume-engine
            sim-limit: ".*/.*fork_Prague"
            shard: prague
            pool-size: 4
          - sim: consume-engine
            sim-limit: ".*/.*fork_Osaka"
            shard: osaka
            pool-size: 4
          - sim: consume-rlp
            sim-limit: ".*(eip2930_access_list|eip4844_blobs).*" # all tests take too long
            shard: rlp
            pool-size: 0
          # Glamsterdam devnet: BAL EIPs against devnet fixtures
          - sim: consume-engine
            sim-limit: ".*(8024|7708|7778|7843|7928|7954|8037).*"
            shard: glamsterdam-devnet
            pool-size: 24
            fixtures-url: "https://github.com/ethereum/execution-spec-tests/releases/download/bal@v5.7.0/fixtures_bal.tar.gz"
            extra-hive-flags: "--sim.buildarg branch=devnets/bal/4 --sim.loglevel=3 --client.checktimelimit=300s"
            erigon-extra-flags: "--experimental.bal"
            # test_block_regular_gas_limit: error classification mismatch (GAS_USED_OVERFLOW vs GAS_ALLOWANCE_EXCEEDED)
            # transitioning to bal-devnet-4
            max-failures: 579
    steps:
      - name: Clean docker system
        run: |
          echo "Force stopping and removing all containers..."
          if [ -n "$(docker ps -aq)" ]; then
            docker kill $(docker ps -aq) || true
            docker rm -f $(docker ps -aq) || true
          fi
          echo "Pruning all images..."
          docker image prune -af || true
          if [ -n "$(docker images -aq)" ]; then
            echo "Force removing all images..."
            docker rmi -f $(docker images -aq) || true
          fi
          echo "Pruning docker system..."
          docker system prune -af --volumes
      - name: Checkout Erigon meta
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            go.mod
            .github/workflows/hive-versions.json
          sparse-checkout-cone-mode: false
          path: erigon-src

      - name: Read pinned Hive ref
        id: hive-version
        run: echo "ref=$(jq -r .hive_ref erigon-src/.github/workflows/hive-versions.json)" >> "$GITHUB_OUTPUT"

      - name: Checkout Hive
        uses: actions/checkout@v6
        with:
          # EXPERIMENT: pinned to erigontech/hive yperbasis/client-pool, which
          # is the upstream-PR-ready (ethereum/hive#1449) warm-daemon client
          # pool. Revert to ethereum/hive + steps.hive-version.outputs.ref
          # once that PR lands; until then we ride this fork.
          repository: erigontech/hive
          ref: a3c9afd9ada800efc41c0287d66f7d083684d3cb
          path: hive

      - name: Conditional Docker Login
        # Only login if we can. Workflow works without it but we want to avoid
        # rate limiting by Docker Hub when possible. External repos don't
        # have access to our Docker secrets.
        # continue-on-error: transient Docker Hub network timeouts should not
        # abort the entire workflow — the run proceeds without login (unlogged pull).
        if: |
          github.repository == 'erigontech/erigon' && 
          github.actor != 'dependabot[bot]' &&
          (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.ORG_DOCKERHUB_ERIGONTECH_USERNAME }}
          password: ${{ secrets.ORG_DOCKERHUB_ERIGONTECH_TOKEN }}

      - name: Setup go env and cache
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.25'

      # Targetting the clients/erigon/Dockerfile.git in the Hive director - 
      # this builds the container from github and uses it for tests
      - name: Get dependencies and build hive
        env:
          SOURCE_REPO: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
        run: |
          cd hive
          git status
          go get . >> buildlogs.log
          rm clients/erigon/Dockerfile
          mv clients/erigon/Dockerfile.git clients/erigon/Dockerfile
          branch_name=$(echo ${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}} | sed 's/[&/\]/\\&/g')
          echo Building Hive with Erigon repo - ${SOURCE_REPO}, branch - $branch_name
          sed -i "s|^ARG github=erigontech/erigon$|ARG github=${SOURCE_REPO}|" clients/erigon/Dockerfile
          sed -i "s/^ARG tag=main$/ARG tag=${branch_name}/" clients/erigon/Dockerfile
          go_version=$(go mod edit -json ../erigon-src/go.mod | jq -r .Go)
          echo "Patching builder Go version to ${go_version}"
          sed -i "s|golang:[0-9.]*-|golang:${go_version}-|" clients/erigon/Dockerfile
          erigon_extra_flags="${{ matrix.erigon-extra-flags }}"
          if [ -n "$erigon_extra_flags" ]; then
            echo "Patching erigon.sh with extra flags: $erigon_extra_flags"
            sed -i '/^echo "Running erigon/i\FLAGS="$FLAGS '"$erigon_extra_flags"'"' clients/erigon/erigon.sh
            if ! grep -qF -- "$erigon_extra_flags" clients/erigon/erigon.sh; then
              echo "ERROR: failed to patch erigon.sh with extra flags" >&2
              exit 1
            fi
          fi
          go build . >> buildlogs.log
      # Depends on the last line of hive output that prints the number of suites, tests and failed
      # Currently, we fail even if suites and tests are too few, indicating the tests did not run
      # We also fail if more than half the tests fail
      - name: Run hive tests and parse output
        run: |
          cd hive
          docker ps
          fixtures_url="${{ matrix.fixtures-url }}"
          if [ -z "$fixtures_url" ]; then
            fixtures_url="https://github.com/ethereum/execution-spec-tests/releases/download/${{ env.EEST_VERSION }}/fixtures_develop.tar.gz"
          fi
          run_suite() {
            echo -e "\n\n============================================================"
            echo "Running test: ${1}"
            echo -e "\n"
            ./hive -docker.output -docker.auth --sim ethereum/eels/"${1}" --sim.limit="${2}" --sim.parallelism=12 --client.pool.size=${{ matrix.pool-size }} --client erigon --docker.nocache=true --sim.limit.exact=false --sim.buildarg fixtures="${fixtures_url}" ${{ matrix.extra-hive-flags }} 2>&1 | tee output.log || {
              if [ $? -gt 0 ]; then
                echo "Exitcode gt 0"
              fi
            }
            status_line=$(tail -2 output.log | head -1 | sed -r "s/\x1B\[[0-9;]*[a-zA-Z]//g")
            suites=$(echo "$status_line" | sed -n 's/.*suites=\([0-9]*\).*/\1/p')
            if [ -z "$suites" ]; then
              status_line=$(tail -1 output.log | sed -r "s/\x1B\[[0-9;]*[a-zA-Z]//g")
              suites=$(echo "$status_line" | sed -n 's/.*suites=\([0-9]*\).*/\1/p')
            fi 
            tests=$(echo "$status_line" | sed -n 's/.*tests=\([0-9]*\).*/\1/p')
            failed=$(echo "$status_line" | sed -n 's/.*failed=\([0-9]*\).*/\1/p')

            echo -e "\n"
            message="-----------   Results for ${1} (${{ matrix.shard }})    -----------\nTests: $tests, Failed: $failed\n\n============================================================"
            echo -e "$message"
            echo -e "$message" >> result.log

            if (( tests < 4 )); then
              echo "Too few tests run for ${{ matrix.shard }} - ${tests} tests"
              echo "failed" > failed.log
              exit 1
            fi
            max_failures=${{ matrix.max-failures || 0 }}
            if (( failed > max_failures )); then
              echo "Too many failures for ${{ matrix.shard }} - ${failed} failed out of ${tests} (max allowed: ${max_failures})"
              echo "failed" > failed.log
              exit 1
            fi
          }
          run_suite "${{ matrix.sim }}" "${{ matrix.sim-limit }}"
        continue-on-error: true
      - name: Upload output log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hive-workspace-log-${{ matrix.shard }}
          path: hive/workspace/logs
          if-no-files-found: ignore
      - name: Test Results
        if: always()
        run: |
          cat hive/result.log
          if grep -q "failed" hive/failed.log; then
            echo "One or more tests failed."
            exit 1
          fi
          echo "All tests passed successfully."



      # This step is not required UNTIL the github-managed runners are dismissed in favor of self-hosted ones (which is planned)
      # So it is good to PROACTIVELY run it (it should not cause any issues within github-managed runners either)
      - name: Remove Hive directory
        run: |
          echo "Removing the Hive directory..."
          rm -rf hive
        if: always()

      # This step is not required UNTIL the github-managed runners are dismissed in favor of self-hosted ones (which is planned)
      # So it is good to PROACTIVELY run it (it should not cause any issues within github-managed runners either)  
      - name: Prune docker
        run: |
          echo "Stopping and removing all containers..."
          docker rm -f $(docker ps -aq) || true
          echo "Removing all images..."
          docker rmi -f $(docker images -aq) || true
          echo "Pruning docker..."
          docker system prune -af --volumes
        if: always()

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }} || true
