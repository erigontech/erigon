name: QA - Clean exit (snapshot downloading)

on: workflow_dispatch

jobs:
  inference:
    permissions:
      models: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: 'v5.4'

      - name: AI failure analysis
        id: inference
        if: failure()
        uses: actions/ai-inference@v2
        with:
          enable-github-mcp: true
          github-mcp-toolsets: 'context,actions,copilot,pull_requests,repos'
          prompt: >
            Analyse the log of this workflow run and identify the root cause, 
            highlight the most relevant error messages, and suggest what to investigate.
            The workflow run ID is: ${{ github.run_id }}

      - name: Print Output
        id: output
        if: always()
        run: echo "${{ steps.inference.outputs.response }}"
