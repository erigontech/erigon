name: Kurtosis Assertoor GitHub Action

env:
  DOCKERHUB_REPOSITORY: "erigontech/erigon"
  APP_REPO: "erigontech/erigon"
  # Pinned versions of third-party containers — bump here when upgrading.
  # These are cached via actions/cache (docker save/load) to avoid re-pulling
  # on every run and to eliminate Docker Hub rate-limit exposure.
  LIGHTHOUSE_IMAGE: "sigp/lighthouse:v7.0.1"
  TEKU_IMAGE: "consensys/teku:25.9.1"
  ASSERTOOR_IMAGE: "ethpandaops/assertoor:v0.0.17"
  # Kurtosis CLI pinned so its infra images (engine/core/files-artifacts-expander
  # are tagged with the CLI version) can be cached too. The vector and fluent-bit
  # tags are dictated by the Kurtosis release — sync them when bumping (see
  # logs_aggregator_functions and logs_collector_functions consts in
  # kurtosis-tech/kurtosis).
  KURTOSIS_VERSION: "1.15.2"
  KURTOSIS_VECTOR_IMAGE: "timberio/vector:0.45.0-debian"
  KURTOSIS_FLUENTBIT_IMAGE: "fluent/fluent-bit:4.0.0"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      cache-warming-only:
        description: "Compile test binaries only; skip test execution (for cache warming runs)"
        type: boolean
        default: false

jobs:
  # Build the erigon image once for the whole matrix. The matrix below has
  # grown to suite × {serial, parallel} entries — having every entry run its
  # own buildx with `cache-to: type=gha,mode=max,scope=kurtosis-erigon-build`
  # means ~a dozen jobs hammering the same GHA cache key concurrently, which
  # the cache backend answers with 504s ("failed to parse error response 504"
  # → `failed to build`). One builder, one cache writer; the matrix consumes
  # the image as a run-scoped artifact.
  build-erigon-image:
    name: build-erigon-image
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-uncaching') }}
    runs-on: ubuntu-latest
    steps:
      - name: Fast checkout git repository
        uses: actions/checkout@v6

      - name: Conditional Docker Login
        # Only login if we can. Workflow works without it but we want to avoid
        # rate limiting by Docker Hub when possible. External repos don't
        # have access to our Docker secrets.
        if: |
          github.repository == 'erigontech/erigon' &&
          github.actor != 'dependabot[bot]' &&
          !github.event.pull_request.head.repo.fork
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_PULL_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PULL_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build erigon Docker image (with BuildKit layer cache)
        id: build_erigon_image
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: test/erigon:current-base
          build-args: |
            BINARIES=erigon caplin
          cache-from: type=gha,scope=kurtosis-erigon-build
          cache-to: type=gha,mode=max,scope=kurtosis-erigon-build

      # docker/build-push-action has no retry input; retry once so a transient
      # Docker Hub / GHA-cache failure doesn't fail an otherwise-good build.
      - name: Retry erigon Docker image build on transient failure
        if: steps.build_erigon_image.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: test/erigon:current-base
          build-args: |
            BINARIES=erigon caplin
          cache-from: type=gha,scope=kurtosis-erigon-build
          cache-to: type=gha,mode=max,scope=kurtosis-erigon-build

      - name: Export erigon image as a run-scoped artifact
        run: docker save test/erigon:current-base -o "${RUNNER_TEMP}/erigon-base-image.tar"

      - name: Upload erigon image artifact
        uses: actions/upload-artifact@v7
        with:
          name: erigon-base-image-${{ github.run_id }}
          path: ${{ runner.temp }}/erigon-base-image.tar
          retention-days: 1
          if-no-files-found: error

  assertoor_test:
    name: assertoor_${{ matrix.suite }}_${{ matrix.exec_mode }}_test
    needs: build-erigon-image
    # On cache-warming runs build-erigon-image alone warms the kurtosis image
    # cache; there's nothing for the matrix to do (the test step is skipped).
    if: ${{ !inputs.cache-warming-only && !contains(github.event.pull_request.labels.*.name, 'skip-uncaching') }}
    runs-on: ubuntu-latest
    strategy:
      # In merge_group: cancel sibling shards on first failure so ci-gate's
      # `needs` reach terminal state quickly and the broken PR can be evicted.
      # In PR runs: keep all shards going so authors see the full failure
      # picture across every shard.
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        # test_timeout_minutes is a per-suite wall-clock cap for the Kurtosis+assertoor
        # step. Observed happy-path durations are roughly:
        #   glamsterdam / caplin-minimal ~12 min, pectra ~30 min, regular ~34 min.
        # The caps below give ~1.5–2x of the happy path so real regressions still
        # pass but pathological hangs (e.g. a node that silently stops proposing)
        # fail in reasonable time instead of burning hours.
        #
        # Each suite runs twice — once with serial exec
        # (ERIGON_EXEC3_PARALLEL=false) and once with parallel — so divergence
        # is caught on the PR. Matrix entries spawn separate hosted runners
        # and run concurrently — wall-clock unchanged, runner-minutes doubled.
        # All entries share the single erigon image built by build-erigon-image.
        include:
          - suite: regular
            package_args: .github/workflows/kurtosis/regular-assertoor.io
            ethereum_package_branch: "5.0.1"
            test_timeout_minutes: 50
            exec_mode: serial
          - suite: regular
            package_args: .github/workflows/kurtosis/regular-assertoor.io
            ethereum_package_branch: "5.0.1"
            test_timeout_minutes: 50
            exec_mode: parallel
          - suite: pectra
            package_args: .github/workflows/kurtosis/pectra.io
            ethereum_package_branch: "5.0.1"
            test_timeout_minutes: 45
            exec_mode: serial
          - suite: pectra
            package_args: .github/workflows/kurtosis/pectra.io
            ethereum_package_branch: "5.0.1"
            test_timeout_minutes: 45
            exec_mode: parallel
          - suite: glamsterdam
            package_args: .github/workflows/kurtosis/glamsterdam.io
            # Pinned to 6.1.0 rather than main: commit 835dd9b on main introduced GpuConfig,
            # a Starlark built-in that requires Kurtosis CLI >=1.18.1, breaking Starlark eval.
            # Unpin to main once CI is upgraded to Kurtosis 1.18.1.
            ethereum_package_branch: "6.1.0"
            test_timeout_minutes: 20
            exec_mode: parallel
          - suite: caplin-minimal
            package_args: .github/workflows/kurtosis/caplin-minimal-assertoor.io
            ethereum_package_url: "github.com/erigontech/ethereum-package"
            ethereum_package_branch: "erigontech/fix-caplin-launcher"
            test_timeout_minutes: 20
            exec_mode: serial
          - suite: caplin-minimal
            package_args: .github/workflows/kurtosis/caplin-minimal-assertoor.io
            ethereum_package_url: "github.com/erigontech/ethereum-package"
            ethereum_package_branch: "erigontech/fix-caplin-launcher"
            test_timeout_minutes: 20
            exec_mode: parallel

    steps:
      - name: Fast checkout git repository
        uses: actions/checkout@v6

      - name: Conditional Docker Login
        # Only login if we can. Workflow works without it but we want to avoid
        # rate limiting by Docker Hub when possible. External repos don't
        # have access to our Docker secrets.
        if: |
          github.repository == 'erigontech/erigon' &&
          github.actor != 'dependabot[bot]' &&
          !github.event.pull_request.head.repo.fork
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_PULL_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PULL_TOKEN }}

      - name: Restore cached third-party containers
        id: cache-cl-images
        uses: actions/cache@v5
        with:
          path: /tmp/docker-cache
          key: docker-cl-${{ env.LIGHTHOUSE_IMAGE }}-${{ env.TEKU_IMAGE }}-${{ env.ASSERTOOR_IMAGE }}-kurtosis-${{ env.KURTOSIS_VERSION }}-${{ env.KURTOSIS_VECTOR_IMAGE }}-${{ env.KURTOSIS_FLUENTBIT_IMAGE }}

      - name: Load cached containers into daemon
        if: steps.cache-cl-images.outputs.cache-hit == 'true'
        run: |
          docker load -i /tmp/docker-cache/lighthouse.tar
          docker load -i /tmp/docker-cache/teku.tar
          docker load -i /tmp/docker-cache/assertoor.tar
          docker load -i /tmp/docker-cache/kurtosis-engine.tar
          docker load -i /tmp/docker-cache/kurtosis-core.tar
          docker load -i /tmp/docker-cache/kurtosis-expander.tar
          docker load -i /tmp/docker-cache/vector.tar
          docker load -i /tmp/docker-cache/fluentbit.tar

      - name: Pull third-party containers and save to cache
        if: steps.cache-cl-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-cache
          pull() {
            for n in 1 2 3; do
              if docker pull "$1"; then return 0; fi
              echo "docker pull $1 failed (attempt $n of 3)"
              sleep $((10 * n))
            done
            return 1
          }
          pull "${LIGHTHOUSE_IMAGE}"
          pull "${TEKU_IMAGE}"
          pull "${ASSERTOOR_IMAGE}"
          pull "kurtosistech/engine:${KURTOSIS_VERSION}"
          pull "kurtosistech/core:${KURTOSIS_VERSION}"
          pull "kurtosistech/files-artifacts-expander:${KURTOSIS_VERSION}"
          pull "${KURTOSIS_VECTOR_IMAGE}"
          pull "${KURTOSIS_FLUENTBIT_IMAGE}"
          docker save "${LIGHTHOUSE_IMAGE}" -o /tmp/docker-cache/lighthouse.tar
          docker save "${TEKU_IMAGE}" -o /tmp/docker-cache/teku.tar
          docker save "${ASSERTOOR_IMAGE}" -o /tmp/docker-cache/assertoor.tar
          docker save "kurtosistech/engine:${KURTOSIS_VERSION}" -o /tmp/docker-cache/kurtosis-engine.tar
          docker save "kurtosistech/core:${KURTOSIS_VERSION}" -o /tmp/docker-cache/kurtosis-core.tar
          docker save "kurtosistech/files-artifacts-expander:${KURTOSIS_VERSION}" -o /tmp/docker-cache/kurtosis-expander.tar
          docker save "${KURTOSIS_VECTOR_IMAGE}" -o /tmp/docker-cache/vector.tar
          docker save "${KURTOSIS_FLUENTBIT_IMAGE}" -o /tmp/docker-cache/fluentbit.tar

      - name: Install Kurtosis CLI and start engine
        # The engine otherwise bootstraps inside `kurtosis run`, mid-action,
        # where a registry blip fails the whole test step. Start it here from
        # the pre-loaded images, with cheap retries.
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt-get update
          sudo apt-get install -y kurtosis-cli=${KURTOSIS_VERSION}
          kurtosis analytics disable
          for n in 1 2 3; do
            if kurtosis engine start; then exit 0; fi
            echo "kurtosis engine start failed (attempt $n of 3)"
            kurtosis engine stop || true
            sleep $((10 * n))
          done
          exit 1

      - name: Download erigon image artifact
        uses: actions/download-artifact@v8
        with:
          name: erigon-base-image-${{ github.run_id }}
          path: ${{ runner.temp }}

      - name: Load erigon base image into daemon
        run: docker load -i "${RUNNER_TEMP}/erigon-base-image.tar"

      - name: Bake exec_mode env into the runtime image
        # Kurtosis launches `test/erigon:current` as the EL participant.
        # Add ERIGON_EXEC3_PARALLEL as an ENV layer on top of the shared
        # base image so the matrix entries differ only in exec mode.
        env:
          ERIGON_EXEC3_PARALLEL: ${{ matrix.exec_mode == 'parallel' && 'true' || 'false' }}
        run: |
          docker build -t test/erigon:current - <<EOF
          FROM test/erigon:current-base
          ENV ERIGON_EXEC3_PARALLEL=${ERIGON_EXEC3_PARALLEL}
          EOF

      - name: Run ${{ matrix.suite }} Kurtosis + assertoor tests
        # On branch push, tests already passed in the merge queue. This run exists
        # solely to warm Docker image and BuildKit caches on main for future PRs
        # and merge queue runs. Skip the actual tests to avoid redundant execution.
        if: '!inputs.cache-warming-only'
        # Per-suite cap — see matrix.test_timeout_minutes. Turns multi-hour
        # hangs (e.g. a node that silently stops proposing) into prompt
        # failures so the next investigation or retry can start sooner
        # instead of burning runner hours on a dead chain.
        timeout-minutes: ${{ matrix.test_timeout_minutes }}
        uses: ethpandaops/kurtosis-assertoor-github-action@v1
        with:
            kurtosis_version: "${{ env.KURTOSIS_VERSION }}"
            enclave_name: "kurtosis-${{ matrix.suite }}-${{ matrix.exec_mode }}-${{ github.run_id }}"
            ethereum_package_url: "${{ matrix.ethereum_package_url || 'github.com/ethpandaops/ethereum-package' }}"
            ethereum_package_args: "${{ matrix.package_args }}"
            ethereum_package_branch: "${{ matrix.ethereum_package_branch }}"
            kurtosis_extra_args: --verbosity detailed --cli-log-level trace
            persistent_logs: "true"

      - name: Dump Kurtosis enclave on failure
        # Capture per-service logs (el-*, cl-*, vc-*, spamoor, assertoor,
        # snooper-*) so test hangs can be diagnosed after the fact. GitHub's
        # log blob storage purges raw CI logs quickly (BlobNotFound within
        # hours), and the orchestration output alone doesn't tell us what
        # each container was actually doing.
        #
        # NB: `kurtosis enclave dump` refuses if the target directory already
        # exists — do NOT pre-create it.
        if: failure() && !inputs.cache-warming-only
        continue-on-error: true
        run: |
          set -eu
          enclave_name="kurtosis-${{ matrix.suite }}-${{ matrix.exec_mode }}-${{ github.run_id }}"
          dump_dir="${RUNNER_TEMP}/kurtosis-dump-${{ matrix.suite }}-${{ matrix.exec_mode }}"
          kurtosis enclave dump "$enclave_name" "$dump_dir" || true

      - name: Upload Kurtosis enclave dump
        if: failure() && !inputs.cache-warming-only
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: kurtosis-dump-${{ matrix.suite }}-${{ matrix.exec_mode }}-${{ github.run_id }}
          path: ${{ runner.temp }}/kurtosis-dump-${{ matrix.suite }}-${{ matrix.exec_mode }}
          retention-days: 7
          if-no-files-found: warn

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::error title=Merge-queue root-cause failure::This job failed and is fast-cancelling the CI Gate run; THIS job is the real failure (the others show as cancelled). See its logs."
          gh run cancel ${{ github.run_id }} || true
