name: CI Gate

on:
  pull_request:
    branches:
      - main
      - 'release/**'
      - performance
      - performance-stable
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  merge_group:
  workflow_dispatch:

concurrency:
  # For PRs: one run per branch; new push cancels the old run.
  # For push/merge_group/workflow_dispatch: unique per run so runs never cancel each other.
  group: >-
    ${{
      github.event_name == 'pull_request' &&
      format('{0}-{1}', github.workflow, github.head_ref) ||
      format('{0}-{1}', github.workflow, github.run_id)
    }}
  cancel-in-progress: true

jobs:
  lint:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  tests:
    uses: ./.github/workflows/test-all-erigon.yml
    secrets: inherit

  race-tests:
    uses: ./.github/workflows/test-all-erigon-race.yml
    secrets: inherit

  hive:
    uses: ./.github/workflows/test-hive.yml
    secrets: inherit

  hive-eest:
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/test-hive-eest.yml
    secrets: inherit

  caplin:
    uses: ./.github/workflows/test-integration-caplin.yml
    secrets: inherit

  # Only meaningful for PRs: needs github.event.pull_request.base.sha.
  large-files:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/check-large-files.yml
    secrets: inherit

  bench:
    uses: ./.github/workflows/test-bench.yml
    secrets: inherit

  kurtosis:
    uses: ./.github/workflows/test-kurtosis-assertoor.yml
    secrets: inherit

  repro:
    uses: ./.github/workflows/reproducible-build.yml
    secrets: inherit

  sonar:
    # SONAR_TOKEN is a repo secret unavailable to fork PRs, so skip the scan
    # for external contributions to avoid a guaranteed failure in ci-gate.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    uses: ./.github/workflows/sonar.yml
    secrets: inherit

  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for all jobs (fail-fast)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo='${{ github.repository }}'
          run_id='${{ github.run_id }}'

          while true; do
            if ! raw=$(gh api "repos/${repo}/actions/runs/${run_id}/jobs" --paginate \
              --jq '.jobs[] | select(.name != "ci-gate") | {name, status, conclusion}'); then
              echo "::warning::API error, retrying in 30s"
              sleep 30
              continue
            fi
            jobs=$(echo "$raw" | jq -s '.')

            # Fail fast: exit as soon as any sibling job fails or is cancelled
            failed=$(echo "$jobs" | jq -r '.[] | select(.conclusion == "failure" or .conclusion == "cancelled") | .name')
            if [ -n "$failed" ]; then
              echo "::error::The following jobs failed or were cancelled:"
              echo "$failed"
              exit 1
            fi

            total=$(echo "$jobs" | jq 'length')
            pending=$(echo "$jobs" | jq '[.[] | select(.status != "completed")] | length')

            if [ "$total" -gt 0 ] && [ "$pending" -eq 0 ]; then
              echo "All ${total} jobs passed."
              exit 0
            fi

            echo "$(date -u +%T) Waiting: $((total - pending))/${total} jobs complete"
            sleep 30
          done
