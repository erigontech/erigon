name: Consensus spec
on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  tests:
    strategy:
      matrix:
        #        disable macos-15 until https://github.com/erigontech/erigon/issues/8789
        os: [ ubuntu-24.04 ] # required check includes runner version. Do not change it only here.
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout custom actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon

      - name: Cache cl_mainnet tarball
        uses: actions/cache@v5
        with:
          # Only cache the .tar.gz; the extracted dir is recreated by
          # tools/test-fixtures.sh on each run from the cached tarball.
          path: test-fixtures-cache/cl_mainnet.tar.gz
          key: test-fixtures-cl-${{ runner.os }}-${{ hashFiles('test-fixtures.json') }}
          restore-keys: |
            test-fixtures-cl-${{ runner.os }}-

      - name: test-integration-caplin
        run: |
          cd cl/spectest
          if make tests; then
            make mainnet 2>&1 | ../../tools/filter-test-output | tee run.log
          else
            echo "::warning::consensus spec test setup failed; skipping mainnet tests"
          fi

      - uses: ./.github/actions/cleanup-erigon
        if: always()

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::error title=Merge-queue root-cause failure::This job failed and is fast-cancelling the CI Gate run; THIS job is the real failure (the others show as cancelled). See its logs."
          gh run cancel ${{ github.run_id }} || true

  tests-windows:
    strategy:
      matrix:
        os: [ windows-2025 ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout custom actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon

      - name: Cache cl_mainnet tarball
        uses: actions/cache@v5
        with:
          path: test-fixtures-cache/cl_mainnet.tar.gz
          key: test-fixtures-cl-${{ runner.os }}-${{ hashFiles('test-fixtures.json') }}
          restore-keys: |
            test-fixtures-cl-${{ runner.os }}-

      - name: test-integration-caplin
        run: |
          cd cl/spectest && make tests
          make mainnet 2>&1 | ../../tools/filter-test-output | tee run.log

      - uses: ./.github/actions/cleanup-erigon
        if: always()

      # In the merge queue, cancel the run on first failure so the gate
      # doesn't stall waiting for still-running siblings. PR runs keep
      # going so authors see the full failure picture.
      - name: Cancel workflow run on failure
        if: failure() && github.event_name == 'merge_group'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::error title=Merge-queue root-cause failure::This job failed and is fast-cancelling the CI Gate run; THIS job is the real failure (the others show as cancelled). See its logs."
          gh run cancel ${{ github.run_id }} || true
