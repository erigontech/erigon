name: Consensus spec
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      cache-warming-only:
        description: "Compile test binaries only; skip test execution (for cache warming runs)"
        type: boolean
        default: false

defaults:
  run:
    shell: bash

jobs:
  tests:
    strategy:
      matrix:
        #        disable macos-15 until https://github.com/erigontech/erigon/issues/8789
        os: [ ubuntu-24.04 ] # required check includes runner version. Do not change it only here.
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout custom actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon

      - name: test-integration-caplin
        if: '!inputs.cache-warming-only'
        run: |
          cd cl/spectest
          if make tests; then
            make mainnet 2>&1 | ../../tools/filter-test-output | tee run.log
          else
            echo "::warning::consensus spec test setup failed; skipping mainnet tests"
          fi

      - name: Build test binaries (cache warming)
        if: inputs.cache-warming-only
        run: go test -run=^$ ./...

      - uses: ./.github/actions/cleanup-erigon
        if: always()

  tests-windows:
    strategy:
      matrix:
        os: [ windows-2025 ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout custom actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-erigon
        id: erigon

      - name: test-integration-caplin
        if: '!inputs.cache-warming-only'
        run: |
          cd cl/spectest && make tests
          make mainnet 2>&1 | ../../tools/filter-test-output | tee run.log

      - name: Build test binaries (cache warming)
        if: inputs.cache-warming-only
        run: go test -run=^$ ./...

      - uses: ./.github/actions/cleanup-erigon
        if: always()
