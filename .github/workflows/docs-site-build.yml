name: Docs Site Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Defensive guard — skip silently only when docs/site/ is absent
      # (e.g. branches that predate the Docusaurus migration).
      - name: Check docs/site is present
        id: guard
        run: |
          if [ ! -d docs/site ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "docs/site directory not found — skipping build"
            exit 0
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Validate docs/site prerequisites
        if: steps.guard.outputs.present == 'true'
        run: |
          test -f docs/site/package.json || { echo "missing docs/site/package.json"; exit 1; }
          test -f docs/site/package-lock.json || { echo "missing docs/site/package-lock.json"; exit 1; }
          test -d docs/site/scripts || { echo "missing docs/site/scripts/"; exit 1; }
          test -f docs/site/scripts/generate-llms.py || { echo "missing docs/site/scripts/generate-llms.py"; exit 1; }

      - uses: actions/setup-python@v6
        if: steps.guard.outputs.present == 'true'
        with:
          python-version: '3.11'

      - name: Verify llms.txt artifacts are up to date
        if: steps.guard.outputs.present == 'true'
        run: |
          python3 docs/site/scripts/generate-llms.py --check
          python3 -m unittest discover docs/site/scripts -v

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.present == 'true'
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - run: npm ci
        if: steps.guard.outputs.present == 'true'
        working-directory: docs/site

      - run: npm run typecheck
        if: steps.guard.outputs.present == 'true'
        working-directory: docs/site

      - run: npm run build
        if: steps.guard.outputs.present == 'true'
        working-directory: docs/site
