# epbs-devnet-1: EIP-7732 ePBS / GLOAS devnet (mainnet preset)
name: epbs-devnet-1
description: EIP-7732 ePBS (enshrined Proposer-Builder Separation) / GLOAS — mainnet preset
branch: feature/caplin_gloas_devnet1

# Network
chain_id: 7070339337
genesis_timestamp: 1774958400  # MIN_GENESIS_TIME 1774958340 + GENESIS_DELAY 60
amsterdam_timestamp: 1774960320  # EL fork time for GLOAS

# CL architecture
embedded_cl: true   # Caplin (single process, no external CL)
cl_type: caplin

# Working directory
workdir: /root/epbs-devnet-1

# URLs
explorer: https://explorer.epbs-devnet-1.ethpandaops.io
faucet: https://faucet.epbs-devnet-1.ethpandaops.io
rpc: https://rpc.epbs-devnet-1.ethpandaops.io
checkpoint_sync: https://checkpoint-sync.epbs-devnet-1.ethpandaops.io
config_base: https://raw.githubusercontent.com/ethpandaops/epbs-devnets/master/network-configs/devnet-1/metadata
inventory_api: https://config.epbs-devnet-1.ethpandaops.io/api/v1/nodes/inventory

# Config file URLs (for first-run download)
genesis_json_url: ${config_base}/genesis.json
config_yaml_url: ${config_base}/config.yaml
genesis_ssz_url: ${config_base}/genesis.ssz
enodes_url: ${config_base}/enodes.txt
bootnodes_url: ${config_base}/bootstrap_nodes.txt

# Port assignments (offset +300 to avoid conflicts with devnet-0)
port_offset: 300
el_http: 8845
el_authrpc: 8851
el_ws: 8846
el_p2p: 30603
el_grpc: 9390
el_torrent: 42369
el_pprof: 6360
el_metrics: 6361
cl_discovery_udp: 4300
cl_discovery_tcp: 4301
cl_beacon_api: 5855

# Env vars
env:
  ERIGON_EXEC3_PARALLEL: "true"
  ERIGON_ASSERT: "true"
  ERIGON_EXEC3_WORKERS: "12"
  LOG_HASH_MISMATCH_REASON: "true"

# Erigon extra flags (Caplin-specific)
extra_el_flags: ""
extra_cl_flags: >-
  --caplin.custom-config=${workdir}/config.yaml
  --caplin.custom-genesis=${workdir}/genesis.ssz
  --caplin.checkpoint-sync-url=${checkpoint_sync}
  --caplin.discovery.addr=0.0.0.0
  --caplin.discovery.port=${cl_discovery_udp}
  --caplin.discovery.tcpport=${cl_discovery_tcp}
  --beacon.api=beacon,builder,config,debug,events,node,validator,lighthouse
  --beacon.api.addr=0.0.0.0
  --beacon.api.port=${cl_beacon_api}

# Process management
stop_command: pkill -f "datadir.*epbs-devnet-1/erigon-data"

# --- Mainnet Preset Notes ---
# epbs-devnet-1 uses the mainnet preset (PRESET_BASE: mainnet).
# Key parameters:
#   SLOTS_PER_EPOCH: 32
#   SECONDS_PER_SLOT: 12
#   MIN_GENESIS_ACTIVE_VALIDATOR_COUNT: 2000
#   GENESIS_DELAY: 60
#   GLOAS_FORK_EPOCH: 5 (fork at epoch 5, i.e. slot 160)
#   All prior forks (Altair through Fulu): epoch 0
#   Heze / EIP7928: disabled (epoch max uint64)
#   Deposit contract: 0x00000000219ab540356cBB839Cbe05303d7705Fa
#   Genesis validators root: 0x2a4a6c8a454f151f5a5d1490bcdc3ff44ac3ea76ac70b3c670562a0018b9a7ff
#
# ptc_window size: (2 + MIN_SEED_LOOKAHEAD) * SLOTS_PER_EPOCH = 3 * 32 = 96 slots
#
# The ethpandaops config.yaml for devnet-1 provides all these values.
# Caplin loads them via --caplin.custom-config which calls CustomConfig(),
# unmarshalling YAML over the mainnet defaults.
