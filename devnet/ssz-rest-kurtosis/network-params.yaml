participants:
  - el_type: erigon
    el_image: local-erigon:ssz-rest
    el_extra_params:
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=8551
      - --authrpc.vhosts=*
      - --http
      - --http.addr=0.0.0.0
      - --http.api=eth,net,web3,erigon,admin
    cl_type: prysm
    cl_image: local-prysm:ssz-rest
    cl_extra_params:
      - --enable-ssz-rest-engine-api
    vc_image: local-prysm-validator:ssz-rest
network_params:
  seconds_per_slot: 4
  deneb_fork_epoch: 0
  electra_fork_epoch: 0
additional_services:
  - spamoor
spamoor_params:
  image: ethpandaops/spamoor:latest
  spammers:
    - scenario: eoatx
      name: ssz-rest-eoatx
      config:
        throughput: 25
        max_pending: 100
        max_wallets: 50
  extra_args: []
