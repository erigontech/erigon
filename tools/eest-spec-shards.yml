# EEST spec-test shard manifest.
#
# Single source of truth for:
#   - .github/workflows/test-eest-spec.yml (load-matrix step → matrix.include)
#   - tools/run-eest-spec-test.sh         (runtime workers / failure budget lookup)
#   - Makefile                            (EEST_SPEC_SHARDS / EEST_SPEC_RACE_SHARDS)
#
# All three readers convert YAML→JSON via `yq -o=json` and then query with `jq`,
# so existing jq expressions are unchanged. mikefarah/yq is pre-installed on
# GitHub-hosted ubuntu-* runners; locally install via `brew install yq` (macOS)
# or `snap install yq` (Linux).
#
# Per-entry keys:
#   shard                 (required) — shard name; see run-eest-spec-test.sh
#                                      for the routing case statement.
#   workers               (required) — parallel worker count.
#   max-allowed-failures  (required) — failure budget; bump only with a comment
#                                      explaining why and a tracking issue.
#   exec3-parallel        (optional, default false) — pins ERIGON_EXEC3_PARALLEL.

